<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Digital Receipt...</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            text-align: center;
        }
        .container {
            max-width: 420px;
            padding: 2.5rem 1.5rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 4px 18px -4px rgba(15, 23, 42, 0.05);
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0f2fe;
            border-top-color: #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Opening your latest receipt...</h2>
        <p id="message">Please wait while we locate your receipt details on this device.</p>
    </div>

    <script>
        // Client-side redirect
        const latestCode = localStorage.getItem('latest_tracking_code');
        if (latestCode) {
            window.location.replace('/r/' + latestCode + '/');
        } else {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('h2').innerText = 'No Receipts Stored';
            document.getElementById('message').innerText = 'No digital receipts have been viewed on this browser yet. Please click the receipt link sent to you via WhatsApp to load it.';
        }
    </script>
</body>
</html>
